<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f1f5f9;
        }

        /* Navbar */

        .navbar{
            position:fixed;
            top:0;
            left:260px;
            right:0;
            height:70px;
            background:#ffffff;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 30px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            z-index:999;
        }

        .navbar h2{
            color:#1e293b;
            font-size:24px;
        }

        .admin-info{
            display:flex;
            align-items:center;
            gap:20px;
        }

        .admin-name{
            font-size:17px;
            font-weight:bold;
            color:#2563eb;
        }

        .logout-btn{
            text-decoration:none;
            background:#dc2626;
            color:white;
            padding:10px 18px;
            border-radius:6px;
            transition:.3s;
        }

        .logout-btn:hover{
            background:#b91c1c;
        }

        /* Main Content */

        .content{
            margin-left:260px;
            margin-top:90px;
            padding:30px;
        }

        /* Footer */

    </style>

</head>
<body>

    <!-- Navbar -->

    <div class="navbar">
<h2 style="text-align:center;">Employee Management System</h2>

        <div class="admin-info">

            <span class="admin-name">
                👤 {{ request.session.username }}
            </span>

            <a href="{% url 'logout' %}" class="logout-btn">
                Logout
            </a>

        </div>

    </div>

    <!-- Page Content -->

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
