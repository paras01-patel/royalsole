{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #f4f6f9;
        color: #334155;
    }

    .sidebar {
        width: 250px;
        height: 100vh;
        background: #1e293b;
        position: fixed;
        left: 0;
        top: 0;
        overflow-y: auto;
        box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }

    .logo {
        padding: 25px;
        text-align: center;
        color: white;
        border-bottom: 1px solid #334155;
    }

    .logo h2 {
        font-size: 24px;
        font-weight: bold;
    }

    .sidebar ul {
        list-style: none;
        margin-top: 20px;
    }

    .sidebar ul li {
        margin: 5px 0;
    }

    .sidebar ul li a {
        display: block;
        padding: 15px 25px;
        color: white;
        text-decoration: none;
        font-size: 17px;
        transition: .3s;
    }

    .sidebar ul li a:hover {
        background: #facc15;
        color: black;
        padding-left: 35px;
        font-weight: bold;
    }

    .content {
        margin-left: 250px;
        padding: 40px;
        background: #f4f6f9;
        min-height: 100vh;
    }

    /* --- New E-Commerce UI Elements CSS --- */
    .header-title {
        margin-bottom: 30px;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 15px;
    }

    .header-title h1 {
        font-size: 28px;
        color: #1e293b;
    }

    /* Stats Grid */
    .stats-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 35px;
    }

    .stat-card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        border-left: 5px solid #1e293b;
    }

    .stat-card.active-accent {
        border-left-color: #facc15;
    }

    .stat-card p {
        font-size: 14px;
        color: #64748b;
        text-transform: uppercase;
        font-weight: bold;
    }

    .stat-card h3 {
        font-size: 24px;
        color: #1e293b;
        margin-top: 5px;
    }

    /* Form Layout */
    .form-wrapper {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }

    .form-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 30px;
    }

    @media (max-width: 900px) {
        .form-grid {
            grid-template-columns: 1fr;
        }
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #475569;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 15px;
        color: #334155;
        background: #f8fafc;
        transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #1e293b;
        background: white;
    }

    textarea {
        resize: none;
    }

    /* Upload Area */
    .upload-box {
        border: 2px dashed #cbd5e1;
        background: #f8fafc;
        padding: 40px 20px;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
    }

    .upload-box:hover {
        border-color: #facc15;
        background: #fefce8;
    }

    .upload-box i {
        font-size: 32px;
        color: #64748b;
        margin-bottom: 10px;
        display: block;
    }

    /* Action Buttons */
    .btn-submit {
        background: #1e293b;
        color: white;
        padding: 14px 28px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        width: 100%;
        margin-top: 15px;
        box-shadow: 0 4px 6px -1px rgba(30, 41, 59, 0.2);
    }

    .btn-submit:hover {
        background: #facc15;
        color: black;
    }
</style>

<div class="sidebar">
    <div class="logo">
        <h2></h2>
    </div>

    <ul>
        <li><a href="">🏠 Dashboard</a></li>
        <li><a href="" style="background:#facc15; color:black; font-weight:bold; padding-left:35px;">➕ Add Product</a></li>
        <li><a href="">📦 My Products</a></li>
        <li><a href="">🛒 Orders</a></li>
        <li><a href="#">👤 Profile</a></li>
        <li><a href="">🚪 Logout</a></li>
    </ul>
</div>

<div class="content">
    <!-- Header Section -->
    <div class="header-title">
        <h1>Add New E-Commerce Product</h1>
    </div>

    <!-- E-com Quick Stats Summary -->
    <div class="stats-container">
        <div class="stat-card">
            <p>Total Products</p>
            <h3>142 Items</h3>
        </div>
        <div class="stat-card active-accent">
            <p>Active Listed</p>
            <h3>128 Online</h3>
        </div>
        <div class="stat-card">
            <p>Out of Stock</p>
            <h3>14 Items</h3>
        </div>
    </div>

    <!-- Product Creation Form Form Wrapper -->
    <div class="form-wrapper">
        <form method="POST" action="." enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-grid">
                
                <!-- Left: Core Product Info -->
                <div>
                    <div class="form-group">
                        <label for="product_name">Product Title / Name *</label>
                        <input type="text" id="product_name" name="product_name" required placeholder="e.g. Wireless Bluetooth Headphones">
                    </div>

                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="category">Category *</label>
                            <select id="category" name="category" required>
                                <option value="" disabled selected>Select Category</option>
                                <option value="electronics">Electronics</option>
                                <option value="fashion">Clothing & Fashion</option>
                                <option value="home">Home & Kitchen</option>
                                <option value="beauty">Beauty & Personal Care</option>
                                <option value="appliances">Appliances</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="brand">Brand Name</label>
                            <input type="text" id="brand" name="brand" placeholder="e.g. Sony, Nike">
                        </div>
                    </div>

                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="mrp">M.R.P. (₹) *</label>
                            <input type="number" id="mrp" name="mrp" required placeholder="Original Price">
                        </div>
                        <div class="form-group">
                            <label for="selling_price">Selling Price (₹) *</label>
                            <input type="number" id="selling_price" name="selling_price" required placeholder="Discounted Price">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Product Description</label>
                        <textarea id="description" name="description" rows="5" placeholder="Write features, specifications, box contents..."></textarea>
                    </div>
                </div>

                <!-- Right: Stock & Media Upload -->
                <div>
                    <div class="form-group">
                        <label for="stock">Inventory / Stock Quantity *</label>
                        <input type="number" id="stock" name="stock" required min="0" placeholder="Available units">
                    </div>

                    <div class="form-group">
                        <label for="sku">SKU / Product Code</label>
                        <input type="text" id="sku" name="sku" placeholder="e.g. PROD-10293">
                    </div>

                    <div class="form-group">
                        <label>Product Main Image *</label>
                        <div class="upload-box" onclick="document.getElementById('product_image').click();">
                            <span>📁 Click to Upload Image</span>
                            <input type="file" id="product_image" name="product_image" required style="display: none;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="status">Listing Status</label>
                        <select id="status" name="status">
                            <option value="active">Active (Visible Online)</option>
                            <option value="draft">Draft (Hidden)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-submit">Publish Product</button>
                </div>

            </div>
        </form>
    </div>
</div>
{% endblock content %}
