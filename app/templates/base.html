<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

nav{
    width:100%;
    background:#111827;
    padding:0px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    display:flex;
    align-items:center;
    text-decoration:none;
}

.logo img{
    width:160px;   /* Apni requirement ke hisaab se change kar sakte ho */
    height:auto;
    object-fit:contain;
}

.nav-links{
    display:flex;
    list-style:none;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:#fff;
    font-size:17px;
    transition:.3s;
}

.nav-links a:hover{
    color:#facc15;
}

.search-box{
    display:flex;
    align-items:center;
}

.search-box input{
    padding:10px 15px;
    border:none;
    outline:none;
    border-radius:5px 0 0 5px;
    width:220px;
}

.search-box button{
    padding:10px 18px;
    border:none;
    background:#facc15;
    cursor:pointer;
    border-radius:0 5px 5px 0;
    font-weight:bold;
}

.search-box button:hover{
    background:#eab308;
}

@media(max-width:768px){

nav{
    flex-direction:column;
    gap:15px;
    padding:20px;
}

.nav-links{
    flex-direction:column;
    text-align:center;
    gap:15px;
}

.search-box input{
    width:180px;
}

}
</style>

</head>
<body>

<nav>

<a href="#" class="logo">
    <img src="https://res.cloudinary.com/dqudfkpvd/image/upload/v1783589397/ChatGPT_Image_Jul_9__2026__02_50_45_PM-removebg-preview_u8qcej.png" alt="Royal Sole Logo">
</a>

<div class="search-box">
    <input type="text" placeholder="Search products...">
    <button>Search</button>
</div>


<ul class="nav-links">
    <li><a href="{% url 'signup' %}">SignUp</a></li>

</ul>


</nav>
{% block content %}

{% endblock content %}

</body>
</html>
